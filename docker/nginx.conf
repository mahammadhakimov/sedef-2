server {
    listen 80;
    index index.php index.html;
    client_max_body_size 256M;
    root /var/www/public;

    # Hide server info
    server_tokens off;

    # Block common admin path scanners
    location ~* ^/(wp-admin|wp-login\.php|administrator|phpmyadmin|pma|adminer|cpanel|webmail|cPanel|plesk) {
        return 404;
    }

    # Block suspicious file access
    location ~* \.(sql|bak|config|ini|log|sh|swp|dist|fla|psd|vb|vbs|old|save|orig|env)$ {
        deny all;
        return 404;
    }

    # Block .git, .env and other sensitive files
    location ~ /\.(ht|git|env|svn) {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;

        # Hide PHP version
        fastcgi_hide_header X-Powered-By;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
